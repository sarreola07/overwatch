<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overwatch — Cloud CV Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>

  <header>
    <div class="brand">
      <div class="brand-mark" aria-hidden="true"></div>
      <div>
        <h1>OVERWATCH</h1>
        <span class="subtitle">Cloud computer-vision pipeline</span>
      </div>
    </div>
    <div class="header-right">
      <span id="mode-badge" class="badge"></span>
      <span id="clock" class="clock" title="UTC time"></span>
    </div>
  </header>

  <section id="stats-bar">
    <div class="stat-tile">
      <span class="stat-value" id="stat-total">–</span>
      <span class="stat-label">Detections · 10 min</span>
    </div>
    <div class="stat-tile">
      <span class="stat-value" id="stat-cams-up">–</span>
      <span class="stat-label">Feeds operational</span>
    </div>
    <div class="stat-tile wide">
      <span class="stat-label">By object class</span>
      <div id="stat-labels" class="stat-labels"></div>
    </div>
  </section>

  <section id="live-section">
    <div id="live-cta">
      <div>
        <strong>Try it with your own camera</strong>
        <p>Stream frames from this device through the detection pipeline. Nothing is stored — frames are analyzed and discarded.</p>
      </div>
      <button id="live-btn">▶&nbsp; GO LIVE</button>
    </div>
    <div id="live-panel" class="hidden">
      <div class="cam-header">
        <span class="health-dot up"></span>
        <span class="cam-name">This device</span>
        <span id="live-status" class="cam-age">starting…</span>
        <button id="live-flip" title="Switch front/back camera">⟲ FLIP</button>
        <button id="live-stop">STOP</button>
      </div>
      <div class="frame-wrap">
        <video id="live-video" autoplay playsinline muted></video>
        <svg id="live-overlay" class="overlay" preserveAspectRatio="none" viewBox="0 0 1 1"></svg>
      </div>
      <div id="live-detections" class="cam-detections"></div>
    </div>
  </section>

  <div class="layout">
    <main id="cameras"></main>

    <aside id="event-log">
      <div class="log-header">EVENT LOG</div>
      <ul id="log-entries"></ul>
    </aside>
  </div>

  <template id="camera-template">
    <article class="camera">
      <div class="cam-header">
        <span class="health-dot"></span>
        <span class="cam-name"></span>
        <span class="cam-age"></span>
      </div>
      <div class="frame-wrap">
        <img class="frame" alt="camera frame" />
        <svg class="overlay" preserveAspectRatio="none" viewBox="0 0 1 1"></svg>
        <div class="no-signal hidden"><span>NO SIGNAL</span></div>
      </div>
      <div class="cam-detections"></div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
